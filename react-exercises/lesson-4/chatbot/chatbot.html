<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
    <link rel="stylesheet" href="chatbot.css">
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatbotHeader () {
        return (
          <div className="chatbot-header-box">
            <img src="robot.png" />
            <div className="chatbot-header-section-1">
              <p> AI Assistant</p>
              <div className="chatbot-header-section-2">
                <div />
                <p>Online</p>
              </div>
            </div>
          </div>
        );
      }

      function ChatInput({chatMessages, setChatMessages, isLoading, setIsLoading}) {
        const inputRef = React.useRef(null);

        React.useEffect(() => {
          if (inputRef.current) {
            inputRef.current.focus();
          }
        }, [chatMessages]);

        const [inputText, setInputText] = React.useState('');
        // const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {

          // Prevent empty messages
          if (inputText.trim() === '') {
            return;
          }

          // Prevent sending while waiting
          if (isLoading) {
            return;
          }

          setIsLoading(true);

          const currentInput = inputText;

          const userMessage = {
            message: currentInput,
            sender: 'user',
            id: crypto.randomUUID()
          };

          const loadingId = crypto.randomUUID();

          const loadingMessage = {
            message: "loading...",
            sender: 'robot',
            id: loadingId
          };

          // Clear input immediately
          setInputText('');

          // Add user + loading messages
          setChatMessages((prev) => [
            ...prev,
            userMessage,
            loadingMessage
          ]);

          try {

            const response = await Chatbot.getResponseAsync(currentInput);

            // Remove loading and add actual response
            setChatMessages((prev) => [
              ...prev.filter((msg) => msg.id !== loadingId),
              {
                message: response,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ]);

          } catch (error) {

            // Remove loading and show error
            setChatMessages((prev) => [
              ...prev.filter((msg) => msg.id !== loadingId),
              {
                message: "Something went wrong.",
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ]);

          } finally {

            setIsLoading(false);

          }
        }

        return (
          <div className="chat-input-container">
            <div className="chat-input-button-box">
              <input
                placeholder="Send a message to Chatbot"
                size="30"
                onChange={saveInputText}
                ref={inputRef}
                onKeyDown={(event) => {

                  if (
                    event.key === "Enter" &&
                    !isLoading
                  ) {
                    sendMessage();
                  }

                  if (event.key === "Escape") {
                    setInputText("");
                  }

                }}
                value={inputText}
                disabled={isLoading}
              />

              <button
                onClick={sendMessage}
                disabled={isLoading || inputText.trim() === ''}
              >
                <img
                  src="send.jpg"
                  width="50px"
                  height="50px"
                />
              </button>
            </div>

          </div>
        );
      }

      function ChatMessage({message, sender, isLoading}) {
        return (
          <div className={`chat-message-box ${sender}`}>
            {sender === 'robot' && (
              <img src="robot.png" width="50"/>
            )}
            {isLoading && message === "loading..." ? (
              <img
                src="loading-spinner.gif"
                alt="Loading..."
              />
            ) : (
              <p>{message}</p>
            )}
            {sender === 'user' && (
              <img src="user.png" width="50"/>
            )}
          </div>
        );
      }

      function useAutoScroll(chatMessages) {
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);
        return (chatMessagesRef);
      }

      function ChatMessages({chatMessages, isLoading}) {
         const chatMessagesRef = useAutoScroll(chatMessages);

        return (
          <div
          className="chat-messages-container"
          ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                message={chatMessage.message}
                sender={chatMessage.sender}
                key={chatMessage.id}
                isLoading={isLoading}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([{
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        }])
        const [isLoading, setIsLoading] = React.useState(false);

        // const inputRef = React.useRef(null);
        // React.useEffect(() => {
        //   if (inputRef.current) {
        //     inputRef.current.focus();
        //   }
        // }, [chatMessages]);

       return (
          <>
            <ChatbotHeader />
            <ChatMessages
              chatMessages={chatMessages}
              isLoading={isLoading}
            />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
              isLoading={isLoading}
              setIsLoading={setIsLoading}
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
