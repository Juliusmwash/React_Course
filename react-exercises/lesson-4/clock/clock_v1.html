<!DOCTYPE html>
<html>
  <head>
    <title>Clock</title>
    <link rel="stylesheet" href="clock.css">
  </head>
  <body>
    <div class="app"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function Clock() {
        const [currentTime, setCurrentTime] = React.useState({
          hour: dayjs().format('HH'),
          minutes: dayjs().format('mm'),
          seconds: dayjs().format('ss')
        });

        React.useEffect(() => {
          setInterval(() => {
            console.log("called");
            setCurrentTime({
              hour: dayjs().format('HH'),
              minutes: dayjs().format('mm'),
              seconds: dayjs().format('ss')
            })
          }, 1000)
        }, [currentTime])


        return(
          <>
            <h1 className="current-time-label">Current Time</h1>
            <div className="clock-container">
              <p className="hour">{currentTime.hour}</p>
              <p className="semicolon">:</p>
              <p className="minutes">{currentTime.minutes}</p>
              <p className="semicolon">:</p>
              <p className="seconds">{currentTime.seconds}</p>
            </div>
          </>
        );
      }
      
      function App() {

        return (
          <>
            <Clock />
          </>
        )
      }

      const appContainer = document.querySelector('.app');
      ReactDOM.createRoot(appContainer).render(<App />);
    </script>
  </body>
</html>
